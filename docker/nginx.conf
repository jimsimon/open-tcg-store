events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    upstream ui {
        server 127.0.0.1:5173;
    }

    upstream api {
        server 127.0.0.1:5174;
    }

    server {
        listen 8080;

        # Allow uploads up to 50MB (CSV imports, product images, etc.)
        client_max_body_size 50m;

        # API routes
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /graphql {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /graphiql {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Built static assets (hashed filenames — cache forever)
        location /assets/ {
            alias /app/dist/client/assets/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Web Awesome runtime assets (icons, etc.) loaded by setBasePath('/webawesome')
        location /webawesome/ {
            alias /app/node_modules/@awesome.me/webawesome/dist/;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
        }

        # Everything else goes to the UI server (SSR pages)
        location / {
            proxy_pass http://ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
