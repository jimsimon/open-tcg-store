name: Daily Release Management - TCG Data Database

on:
  schedule:
    # Run daily at 12:30 PM UTC (8:30 AM EDT / 7:30 AM EST)
    - cron: '30 12 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write # Grants write permission to the workflow for creating/updating releases
  actions: read # Allows reading workflow run information

jobs:
  create-tcg-data-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y p7zip-full xdelta3

      - name: Download previous release DB
        id: download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./sqlite-data

          # Find the latest release with our tag prefix (check both new and legacy prefixes)
          LATEST_TAG=$(curl -sf \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=20" \
            | jq -r '[.[] | select(.tag_name | (startswith("tcg-data-") or startswith("initial-db-")))] | sort_by(.created_at) | reverse | .[0].tag_name // empty')

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release found, starting fresh"
            echo "has_previous=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Downloading DB from release: $LATEST_TAG"

          # Get release assets (try compressed .7z first, fall back to uncompressed .sqlite)
          RELEASE_JSON=$(curl -sf \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$LATEST_TAG")

          ASSET_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name == "tcg-data.sqlite.7z") | .id // empty')
          COMPRESSED=true

          if [ -z "$ASSET_ID" ]; then
            # Fall back to uncompressed asset from older releases
            ASSET_ID=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name == "tcg-data.sqlite") | .id // empty')
            COMPRESSED=false
          fi

          if [ -z "$ASSET_ID" ]; then
            echo "::warning::Release $LATEST_TAG has no database asset, starting fresh"
            echo "has_previous=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$COMPRESSED" = "true" ]; then
            curl -sfL \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/octet-stream" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
              -o ./sqlite-data/tcg-data.sqlite.7z
            7z x ./sqlite-data/tcg-data.sqlite.7z -o./sqlite-data/ -y
            rm -f ./sqlite-data/tcg-data.sqlite.7z
          else
            curl -sfL \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/octet-stream" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
              -o ./sqlite-data/tcg-data.sqlite
          fi

          # Save hash of the previous DB for xdelta3 delta generation
          sha256sum ./sqlite-data/tcg-data.sqlite | cut -d' ' -f1 > ./sqlite-data/tcg-data.from.sha256

          # Keep a copy of the old DB for delta computation later
          cp ./sqlite-data/tcg-data.sqlite ./sqlite-data/tcg-data.sqlite.old
          echo "has_previous=true" >> $GITHUB_OUTPUT

      - name: Run database migrations
        run: |
          # Try running migrations against the downloaded DB.
          # If the migration history is incompatible (e.g., after a schema
          # rewrite that regenerated migrations from scratch), start fresh.
          if ! pnpm --filter @open-tcgs/api db:migrate:tcg-data 2>&1; then
            echo "::warning::Migration failed on previous DB — incompatible schema. Starting fresh."
            rm -f ./sqlite-data/tcg-data.sqlite
            rm -f ./sqlite-data/tcg-data.sqlite.old
            pnpm --filter @open-tcgs/api db:migrate:tcg-data
          fi

      - name: Populate database
        run: ./scripts/populate-tcg-data.ts --skip-history

      - name: Compute database hash
        id: hash
        run: |
          sha256sum ./sqlite-data/tcg-data.sqlite > ./sqlite-data/tcg-data.sqlite.sha256
          echo "sha256=$(cut -d' ' -f1 ./sqlite-data/tcg-data.sqlite.sha256)" >> $GITHUB_OUTPUT

      - name: Generate xdelta3 patch
        id: delta
        if: steps.download.outputs.has_previous == 'true'
        run: |
          OLD_DB="./sqlite-data/tcg-data.sqlite.old"
          NEW_DB="./sqlite-data/tcg-data.sqlite"
          DELTA="./sqlite-data/tcg-data.delta.xd3"

          if [ ! -f "$OLD_DB" ]; then
            echo "No old DB to diff against (was deleted due to migration failure)"
            echo "has_delta=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Generate binary delta between old and new database
          xdelta3 -e -s "$OLD_DB" "$NEW_DB" "$DELTA"
          echo "has_delta=true" >> $GITHUB_OUTPUT

          # Clean up old DB copy
          rm -f "$OLD_DB"

      - name: Compress database
        working-directory: ./sqlite-data
        run: |
          echo "Uncompressed size: $(du -h tcg-data.sqlite | cut -f1)"
          7z a -mx=9 tcg-data.sqlite.7z tcg-data.sqlite
          echo "Compressed size: $(du -h tcg-data.sqlite.7z | cut -f1)"

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "tcg-data-${{ steps.hash.outputs.sha256 }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release tcg-data-${{ steps.hash.outputs.sha256 }} already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release assets
        if: steps.check_release.outputs.exists == 'false'
        id: assets
        run: |
          # Build the asset list (compressed DB + uncompressed hash for verification)
          ASSETS="./sqlite-data/tcg-data.sqlite.7z
          ./sqlite-data/tcg-data.sqlite.sha256"

          if [ "${{ steps.delta.outputs.has_delta }}" = "true" ]; then
            ASSETS="$ASSETS
          ./sqlite-data/tcg-data.delta.xd3
          ./sqlite-data/tcg-data.from.sha256"
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$ASSETS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: tcg-data-${{ steps.hash.outputs.sha256 }}
          name: TCG Data ${{ steps.hash.outputs.sha256 }}
          body: |
            Daily TCG data database update
            - SHA-256: ${{ steps.hash.outputs.sha256 }}
            - Run number: ${{ github.run_number }}
            - Delta available: ${{ steps.delta.outputs.has_delta || 'false' }}

            This release contains the latest database preloaded with all TCG data in SQLite format.
          files: ${{ steps.assets.outputs.files }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
