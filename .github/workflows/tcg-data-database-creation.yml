name: Daily Release Management - TCG Data Database

on:
  schedule:
    # Run daily at 6 AM Eastern Time (UTC-4)
    # 9 PM Eastern = 21 PM UTC
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write # Grants write permission to the workflow for creating/updating releases
  actions: read # Allows reading workflow run information

jobs:
  create-tcg-data-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download previous release DB
        id: download-db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./sqlite-data

          # Find the latest release with our tag prefix
          LATEST_TAG=$(curl -sf \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=20" \
            | jq -r '[.[] | select(.tag_name | startswith("initial-db-"))] | sort_by(.tag_name) | reverse | .[0].tag_name // empty')

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release found, starting fresh"
            echo "downloaded=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Downloading DB from release: $LATEST_TAG"

          # Get the asset ID for authenticated download (works for both public and private repos)
          ASSET_ID=$(curl -sf \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$LATEST_TAG" \
            | jq -r '.assets[] | select(.name == "tcg-data.sqlite") | .id // empty')

          if [ -z "$ASSET_ID" ]; then
            echo "Release $LATEST_TAG has no tcg-data.sqlite asset, starting fresh"
            echo "downloaded=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if curl -sfL \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
            -o ./sqlite-data/tcg-data.sqlite; then
            echo "downloaded=true" >> $GITHUB_OUTPUT
          else
            echo "Failed to download asset, starting fresh"
            rm -f ./sqlite-data/tcg-data.sqlite
            echo "downloaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Create empty database file
        if: steps.download-db.outputs.downloaded != 'true'
        run: mkdir -p ./sqlite-data && touch ./sqlite-data/tcg-data.sqlite

      - name: Push database schema
        id: push-schema
        run: |
          if ! pnpm run --filter=api db:push:tcg-data; then
            echo "Schema push failed on downloaded DB (likely incompatible schema changes)."
            echo "Falling back to fresh database."
            rm -f ./sqlite-data/tcg-data.sqlite
            touch ./sqlite-data/tcg-data.sqlite
            pnpm run --filter=api db:push:tcg-data
          fi

      - name: Populate database
        run: ./scripts/populate-tcg-data.ts

      - name: Generate Date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: initial-db-${{ steps.date.outputs.date }}
          name: Initial Database ${{ steps.date.outputs.date }}
          body: |
            Daily initial database update
            - Generated on: ${{ steps.date.outputs.date }}
            - Run number: ${{ github.run_number }}

            This release contains the latest database schema preloaded with all TCG data in SQLite format.
          files: ./sqlite-data/tcg-data.sqlite
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
