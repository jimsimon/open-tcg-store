name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Format
        run: pnpm format:check

  test:
    name: API Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests with coverage
        run: pnpm vitest run --project API --coverage

  test-browser:
    name: UI Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Run UI browser tests
        run: pnpm vitest run --project UI

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build UI
        run: pnpm --filter @open-tcgs/ui build

  check-migrations:
    name: Check Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate migrations
        run: pnpm --filter @open-tcgs/api run db:generate

      - name: Check for uncommitted migrations
        run: |
          if ! git diff --exit-code packages/api/src/db/otcgs/migrations/; then
            echo "::error::Schema changes detected without corresponding migrations. Run 'pnpm --filter @open-tcgs/api run db:generate' and commit the results."
            exit 1
          fi

      - name: Verify migration metadata integrity
        run: pnpm --filter @open-tcgs/api run db:check

      - name: Generate TCG data migrations
        run: pnpm --filter @open-tcgs/api run db:generate:tcg-data

      - name: Check for uncommitted TCG data migrations
        run: |
          if ! git diff --exit-code packages/api/src/db/tcg-data/migrations/; then
            echo "::error::TCG data schema changes detected without corresponding migrations. Run 'pnpm --filter @open-tcgs/api run db:generate:tcg-data' and commit the results."
            exit 1
          fi

      - name: Verify TCG data migration metadata integrity
        run: pnpm --filter @open-tcgs/api run db:check:tcg-data
