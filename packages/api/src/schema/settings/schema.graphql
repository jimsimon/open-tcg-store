enum BackupProvider {
  google_drive
  dropbox
  onedrive
}

type StoreSettings {
  companyName: String
  ein: String
}

type BackupSettings {
  provider: BackupProvider
  frequency: String
  lastBackupAt: String
  googleDriveConnected: Boolean!
  dropboxConnected: Boolean!
  onedriveConnected: Boolean!
}

type IntegrationSettings {
  stripe: StripeIntegration!
  shopify: ShopifyIntegration!
}

type StripeIntegration {
  enabled: Boolean!
  hasApiKey: Boolean!
  hasPublishableKey: Boolean!
}

type ShopifyIntegration {
  enabled: Boolean!
  hasApiKey: Boolean!
  shopDomain: String
}

type SalesTaxLookupResult {
  rate: Float!
  type: String!
  currency: String
}

type BackupResult {
  success: Boolean!
  message: String
  timestamp: String
}

type RestoreResult {
  success: Boolean!
  message: String
}

type DataUpdateStatus {
  currentVersion: String
  latestVersion: String
  updateAvailable: Boolean!
  isUpdating: Boolean!
}

type DataUpdateResult {
  success: Boolean!
  message: String
  newVersion: String
}

input UpdateStoreSettingsInput {
  companyName: String
  ein: String
}

input UpdateBackupSettingsInput {
  provider: BackupProvider
  frequency: String
}

input UpdateStripeIntegrationInput {
  enabled: Boolean
  apiKey: String
  publishableKey: String
}

input UpdateShopifyIntegrationInput {
  enabled: Boolean
  apiKey: String
  shopDomain: String
}

extend type Query {
  getStoreSettings: StoreSettings!
  getBackupSettings: BackupSettings!
  getIntegrationSettings: IntegrationSettings!
  lookupSalesTax(countryCode: String!, stateCode: String!): SalesTaxLookupResult!
  getDataUpdateStatus: DataUpdateStatus!
}

extend type Mutation {
  updateStoreSettings(input: UpdateStoreSettingsInput!): StoreSettings!
  updateBackupSettings(input: UpdateBackupSettingsInput!): BackupSettings!
  triggerBackup: BackupResult!
  triggerRestore(provider: BackupProvider!): RestoreResult!
  updateStripeIntegration(input: UpdateStripeIntegrationInput!): StripeIntegration!
  updateShopifyIntegration(input: UpdateShopifyIntegrationInput!): ShopifyIntegration!
  triggerDataUpdate: DataUpdateResult!
}
