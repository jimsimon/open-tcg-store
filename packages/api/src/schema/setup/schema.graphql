input UserDetails {
  email: String!
  firstName: String!
  password: String!
}

input InitialStoreLocation {
  name: String!
  slug: String!
  street1: String!
  street2: String
  city: String!
  state: String!
  zip: String!
  phone: String
}

input CompanySettings {
  companyName: String!
  ein: String!
}

extend type Mutation {
  firstTimeSetup(
    userDetails: UserDetails!
    company: CompanySettings!
    store: InitialStoreLocation!
    supportedGameCategoryIds: [Int!]!
  ): String!
}

extend type Query {
  isSetupPending: Boolean!
}
