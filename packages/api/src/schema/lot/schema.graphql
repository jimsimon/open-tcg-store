type Lot {
  id: Int!
  organizationId: String!
  name: String!
  description: String
  amountPaid: Int! # cents
  acquisitionDate: String!
  items: [LotItem!]!
  totalMarketValue: Int! # cents
  totalCost: Int! # cents
  projectedProfitLoss: Int! # cents
  projectedProfitMargin: Float!
  createdAt: String!
  updatedAt: String!
}

type LotItem {
  id: Int!
  lotId: Int!
  productId: Int!
  productName: String!
  gameName: String!
  setName: String!
  rarity: String
  isSingle: Boolean!
  isSealed: Boolean!
  condition: CardCondition
  quantity: Int!
  costBasis: Int! # cents
  costOverridden: Boolean!
  marketValue: Int # cents
}

type LotPage {
  items: [Lot!]!
  totalCount: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

input CreateLotInput {
  name: String!
  description: String
  amountPaid: Int! # cents
  acquisitionDate: String!
  items: [LotItemInput!]!
}

input UpdateLotInput {
  id: Int!
  name: String!
  description: String
  amountPaid: Int! # cents
  acquisitionDate: String!
  items: [LotItemInput!]!
}

input LotItemInput {
  id: Int
  productId: Int!
  condition: CardCondition
  quantity: Int!
  costBasis: Int! # cents
  costOverridden: Boolean!
}

input LotFilters {
  searchTerm: String
}

type LotStats {
  totalLots: Int!
  totalInvested: Int! # cents
  totalMarketValue: Int! # cents
  totalProfitLoss: Int! # cents
}

extend type Query {
  getLots(filters: LotFilters, pagination: PaginationInput): LotPage!
  getLot(id: Int!): Lot
  getLotStats: LotStats!
  getDistinctRarities(categoryId: Int!): [String!]!
}

extend type Mutation {
  createLot(input: CreateLotInput!): Lot!
  updateLot(input: UpdateLotInput!): Lot!
  deleteLot(id: Int!): Boolean!
}
