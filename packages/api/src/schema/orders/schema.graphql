enum OrderStatus {
  open
  completed
  cancelled
}

type Order {
  id: Int!
  organizationId: String!
  orderNumber: String!
  customerName: String!
  status: OrderStatus!
  totalAmount: Int! # cents
  totalCostBasis: Int # cents
  totalProfit: Int # cents
  createdAt: String!
  items: [OrderItem!]!
}

type OrderItem {
  id: Int!
  productId: Int!
  productName: String!
  condition: CardCondition!
  quantity: Int!
  unitPrice: Int! # cents
  costBasis: Int # cents
  profit: Int # cents
  lotId: Int
}

type OrderPage {
  items: [Order!]!
  totalCount: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

input SubmitOrderInput {
  organizationId: String!
  customerName: String!
}

type SubmitOrderResult {
  order: Order
  error: String
  insufficientItems: [InsufficientItem!]
}

type InsufficientItem {
  productId: Int!
  productName: String!
  condition: CardCondition!
  requested: Int!
  available: Int!
}

type CancelOrderResult {
  order: Order
  error: String
}

type UpdateOrderStatusResult {
  order: Order
  error: String
}

extend type Mutation {
  submitOrder(input: SubmitOrderInput!): SubmitOrderResult!
  cancelOrder(orderId: Int!): CancelOrderResult!
  updateOrderStatus(orderId: Int!, status: OrderStatus!): UpdateOrderStatusResult!
}

input OrderFilters {
  organizationId: String
  status: OrderStatus
  searchTerm: String
}

extend type Query {
  getOrders(pagination: PaginationInput, filters: OrderFilters): OrderPage!
}
