type InventoryItem {
  id: Int!
  organizationId: String!
  productId: Int!
  productName: String!
  gameName: String!
  setName: String!
  rarity: String
  isSingle: Boolean!
  isSealed: Boolean!
  condition: String!
  price: Float!
  totalQuantity: Int!
  entryCount: Int!
  createdAt: String!
  updatedAt: String!
}

type InventoryItemStock {
  id: Int!
  inventoryItemId: Int!
  quantity: Int!
  costBasis: Float!
  acquisitionDate: String!
  notes: String
  createdAt: String!
  updatedAt: String!
}

type InventoryPage {
  items: [InventoryItem!]!
  totalCount: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

type InventoryStockPage {
  items: [InventoryItemStock!]!
  totalCount: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

input InventoryFilters {
  organizationId: String
  gameName: String
  setName: String
  rarity: String
  condition: String
  searchTerm: String
  includeSingles: Boolean
  includeSealed: Boolean
}

input PaginationInput {
  page: Int
  pageSize: Int
}

input AddInventoryItemInput {
  productId: Int!
  condition: String!
  price: Float!
  quantity: Int!
  costBasis: Float!
  acquisitionDate: String!
  notes: String
}

input UpdateInventoryItemInput {
  id: Int!
  condition: String
  price: Float
}

input AddStockInput {
  inventoryItemId: Int!
  quantity: Int!
  costBasis: Float!
  acquisitionDate: String!
  notes: String
}

input UpdateStockInput {
  id: Int!
  quantity: Int
  costBasis: Float
  acquisitionDate: String
  notes: String
}

input BulkUpdateStockInput {
  ids: [Int!]!
  quantity: Int
  costBasis: Float
  acquisitionDate: String
  notes: String
}

input BulkDeleteStockInput {
  ids: [Int!]!
}

extend type Query {
  getInventory(filters: InventoryFilters, pagination: PaginationInput): InventoryPage!
  getInventoryItem(id: Int!): InventoryItem
  getInventoryItemDetails(inventoryItemId: Int!, pagination: PaginationInput): InventoryStockPage!
  searchProducts(searchTerm: String!, game: String): [ProductSearchResult!]!
}

type ProductSearchResult {
  id: Int!
  name: String!
  gameName: String!
  setName: String!
  rarity: String
  imageUrl: String
  isSingle: Boolean!
  isSealed: Boolean!
  prices: [ProductPrice!]!
}

type ProductPrice {
  subTypeName: String!
  lowPrice: Float
  midPrice: Float
  highPrice: Float
  marketPrice: Float
  directLowPrice: Float
}

extend type Mutation {
  addInventoryItem(input: AddInventoryItemInput!): InventoryItem!
  updateInventoryItem(input: UpdateInventoryItemInput!): InventoryItem!
  deleteInventoryItem(id: Int!): Boolean!
  addStock(input: AddStockInput!): InventoryItemStock!
  updateStock(input: UpdateStockInput!): InventoryItemStock!
  deleteStock(id: Int!): Boolean!
  bulkUpdateStock(input: BulkUpdateStockInput!): [InventoryItemStock!]!
  bulkDeleteStock(input: BulkDeleteStockInput!): Boolean!
}
