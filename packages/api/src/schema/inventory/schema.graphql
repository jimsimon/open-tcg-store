enum CardCondition {
  NM
  LP
  MP
  HP
  D
}

type InventoryItem {
  id: Int!
  organizationId: String!
  productId: Int!
  productName: String!
  gameName: String!
  setName: String!
  rarity: String
  isSingle: Boolean!
  isSealed: Boolean!
  condition: CardCondition!
  price: Int! # cents
  totalQuantity: Int!
  entryCount: Int!
  createdAt: String!
  updatedAt: String!
}

type InventoryItemStock {
  id: Int!
  inventoryItemId: Int!
  quantity: Int!
  costBasis: Int! # cents
  acquisitionDate: String!
  notes: String
  createdAt: String!
  updatedAt: String!
}

type InventoryPage {
  items: [InventoryItem!]!
  totalCount: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

type InventoryStockPage {
  items: [InventoryItemStock!]!
  totalCount: Int!
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

input InventoryFilters {
  organizationId: String
  gameName: String
  setName: String
  rarity: String
  condition: CardCondition
  searchTerm: String
  includeSingles: Boolean
  includeSealed: Boolean
}

input PaginationInput {
  page: Int
  pageSize: Int
}

input AddInventoryItemInput {
  productId: Int!
  condition: CardCondition!
  price: Int! # cents
  quantity: Int!
  costBasis: Int! # cents
  acquisitionDate: String!
  notes: String
  barcodes: [String!]
}

type Barcode {
  id: Int!
  code: String!
  inventoryItemId: Int!
  createdAt: String!
}

type BarcodeLookupResult {
  inventoryItemId: Int!
  productId: Int!
  productName: String!
  gameName: String!
  setName: String!
  condition: CardCondition!
  price: Int!
  availableQuantity: Int!
  imageUrl: String
}

input AddBarcodeInput {
  inventoryItemId: Int!
  code: String!
}

input RemoveBarcodeInput {
  id: Int!
}

input UpdateInventoryItemInput {
  id: Int!
  condition: CardCondition
  price: Int # cents
}

input AddStockInput {
  inventoryItemId: Int!
  quantity: Int!
  costBasis: Int! # cents
  acquisitionDate: String!
  notes: String
}

input UpdateStockInput {
  id: Int!
  quantity: Int
  costBasis: Int # cents
  acquisitionDate: String
  notes: String
}

input BulkUpdateStockInput {
  ids: [Int!]!
  quantity: Int
  costBasis: Int # cents
  acquisitionDate: String
  notes: String
}

input BulkDeleteStockInput {
  ids: [Int!]!
}

extend type Query {
  getInventory(filters: InventoryFilters, pagination: PaginationInput): InventoryPage!
  getInventoryItem(id: Int!): InventoryItem
  getInventoryItemDetails(inventoryItemId: Int!, pagination: PaginationInput): InventoryStockPage!
  searchProducts(searchTerm: String!, game: String, isSingle: Boolean, isSealed: Boolean): [ProductSearchResult!]!
  lookupBarcode(code: String!): BarcodeLookupResult
  getBarcodesForInventoryItem(inventoryItemId: Int!): [Barcode!]!
}

type ProductSearchResult {
  id: Int!
  name: String!
  gameName: String!
  setName: String!
  rarity: String
  imageUrl: String
  isSingle: Boolean!
  isSealed: Boolean!
  prices: [ProductPrice!]!
}

type ProductPrice {
  subTypeName: String!
  lowPrice: Int # cents
  midPrice: Int # cents
  highPrice: Int # cents
  marketPrice: Int # cents
  directLowPrice: Int # cents
}

extend type Mutation {
  addInventoryItem(input: AddInventoryItemInput!): InventoryItem!
  updateInventoryItem(input: UpdateInventoryItemInput!): InventoryItem!
  deleteInventoryItem(id: Int!): Boolean!
  addStock(input: AddStockInput!): InventoryItemStock!
  updateStock(input: UpdateStockInput!): InventoryItemStock!
  deleteStock(id: Int!): Boolean!
  bulkUpdateStock(input: BulkUpdateStockInput!): [InventoryItemStock!]!
  bulkDeleteStock(input: BulkDeleteStockInput!): Boolean!
  addBarcode(input: AddBarcodeInput!): Barcode!
  removeBarcode(input: RemoveBarcodeInput!): Boolean!
}
